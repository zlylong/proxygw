name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Backend
        run: |
          cd backend
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o proxygw-backend-linux-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/proxygw-backend-linux-amd64
          generate_release_notes: true
